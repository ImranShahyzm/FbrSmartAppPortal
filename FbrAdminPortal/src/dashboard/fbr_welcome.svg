<svg width="800" height="400" viewBox="0 0 800 400" fill="none" xmlns="http://w3.org/2000/svg">
  <defs>
    <linearGradient id="fbrGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00AEEF" />
      <stop offset="100%" stop-color="#003399" />
    </linearGradient>
    <linearGradient id="arcGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2E7D32" />
      <stop offset="50%" stop-color="#76B57B" />
      <stop offset="100%" stop-color="#2E7D32" />
    </linearGradient>
  </defs>

  <!-- Digital Invoicing Section -->
  <g transform="translate(50, 50) scale(0.6)">
    <path d="M40 25H160C205 25 240 60 240 105C240 150 205 185 160 185H105V155H160C188 155 210 133 210 105C210 77 188 55 160 55H70V105H40V25Z" fill="#325DAA"/>
    <path d="M40 115H105V145H70V185H40V115Z" fill="#76B57B"/>
    <text x="260" y="90" font-family="Arial, sans-serif" font-size="64" fill="#8E9191" font-weight="bold">DIGITAL</text>
    <text x="260" y="165" font-family="Arial, sans-serif" font-size="72" fill="#8E9191" font-weight="bold">INVOICING</text>
  </g>

  <!-- FBR Pakistan Logo Section -->
  <g transform="translate(100, 220)">
    <path d="M50,80 Q300,-20 550,80" stroke="url(#arcGradient)" stroke-width="12" fill="none" stroke-linecap="round"/>
    <path d="M300,10 L300,50 M280,30 L320,30" stroke="#FFD700" stroke-width="4" stroke-linecap="round"/>
    <circle cx="300" cy="30" r="8" fill="#FFCC00" opacity="0.8"/>
    <text x="300" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="100" font-weight="900" fill="url(#fbrGradient)" style="letter-spacing:2px">FBR</text>
    <text x="300" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#003399" style="letter-spacing:8px">PAKISTAN</text>
  </g>
</svg>

